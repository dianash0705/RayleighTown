<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RayleighTown Alerts Viewer (POC)</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* CSS Variables for a cohesive, elegant palette */
    :root {
      --primary: #7b61ff; 
      --primary-hover: #6a4dfc;
      --bg-gradient: linear-gradient(135deg, #f3f5f9 0%, #e8ecf3 100%);
      --surface: #ffffff;
      --text-main: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      padding: 40px 20px;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* The main "Card" to provide depth */
    .container {
      background: var(--surface);
      width: 100%;
      max-width: 850px;
      padding: 32px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
      height: fit-content;
    }

    h2 {
      margin-top: 0;
      color: var(--text-main);
      font-weight: 600;
      font-size: 1.5rem;
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    form { 
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px; 
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text-main);
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.15);
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(123, 97, 255, 0.2);
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 8px -2px rgba(123, 97, 255, 0.25);
    }

    button:active {
      transform: translateY(0);
    }

    #status {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      min-height: 20px;
    }

    table { 
      border-collapse: collapse; 
      width: 100%; 
      font-size: 0.95rem;
    }

    th, td { 
      padding: 14px 16px; 
      text-align: left; 
      border-bottom: 1px solid var(--border); 
    }

    th { 
      background: #f8fafc; 
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Rounding the top corners of the table header */
    th:first-child { border-top-left-radius: 8px; }
    th:last-child { border-top-right-radius: 8px; }

    /* Subtle hover state for table rows */
    tbody tr {
      transition: background-color 0.15s ease;
    }
    
    tbody tr:hover {
      background-color: #f8fafc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>RayleighTown Alerts Viewer</h2>

    <form id="queryForm">
      <label>
        Endpoint ID:
        <input id="endpointID" value="123" placeholder="e.g. 123" required />
      </label>
      <button type="submit">Load Alerts</button>
    </form>

    <div id="status"></div>

    <table id="alertsTable" hidden>
      <thead>
        <tr>
          <th>Alert ID</th>
          <th>Endpoint</th>
          <th>Start (ms)</th>
          <th>End (ms)</th>
          <th>Period (ms)</th>
          <th>Confidence</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById("queryForm");
    const endpointInput = document.getElementById("endpointID");
    const statusEl = document.getElementById("status");
    const table = document.getElementById("alertsTable");
    const tbody = table.querySelector("tbody");

    function renderRows(alerts) {
      tbody.innerHTML = "";
      for (const alert of alerts) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + alert.alertID + "</td>" +
          "<td>" + alert.endpointID + "</td>" +
          "<td>" + alert.tsBegin + "</td>" +
          "<td>" + alert.tsEnd + "</td>" +
          "<td>" + alert.periodTs + "</td>" +
          "<td>" + alert.confidence + "</td>";
        tbody.appendChild(tr);
      }
      table.hidden = alerts.length === 0;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      const endpointID = endpointInput.value.trim();
      if (!endpointID) {
        return;
      }

      statusEl.textContent = "Loading...";
      table.hidden = true;
      tbody.innerHTML = "";

      try {
        const response = await fetch("/api/alerts?endpointID=" + encodeURIComponent(endpointID));
        const data = await response.json();

        if (!response.ok) {
          statusEl.textContent = data.error || "Failed to load alerts";
          return;
        }

        statusEl.textContent = "Found " + data.count + " alert(s)";
        renderRows(data.alerts);
      } catch (error) {
        statusEl.textContent = "Network error";
      }
    });
  </script>
</body>
</html>
